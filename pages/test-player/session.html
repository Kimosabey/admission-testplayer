<div class="h-screen w-full bg-surface-sunken" data-page="test-player">
  <div class="h-full flex flex-col overflow-hidden">
    <div class="bg-warning-muted border-b border-border px-6 py-3">
      <p class="text-sm text-warning font-medium">🔒 Secure Mode Active</p>
    </div>

    <header class="border-b border-border bg-surface px-6 py-4">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <p class="font-mono text-xs uppercase track-xl text-ink-3">Session</p>
          <p id="tp-session" class="mt-1 font-mono text-xs text-ink-2">—</p>
          <p id="tp-save" role="status" class="mt-1 font-mono text-xs text-ink-3">Saved —</p>
        </div>

        <div class="flex items-center gap-3">
          <div
            id="tp-timer"
            class="h-10 px-4 rounded-xl border border-border bg-surface font-mono text-sm text-ink-2 flex items-center"
            aria-label="Time remaining"
          >
            00:00:00
          </div>
          <button
            id="tp-submit-open"
            type="button"
            class="h-10 px-4 rounded-xl border border-border bg-primary hover:bg-primary-light transition-colors"
            style="color: var(--color-text-inverse);"
          >
            Submit
          </button>
        </div>
      </div>

      <div class="mt-4 flex flex-wrap items-center gap-3">
        <span class="inline-flex items-center gap-2 rounded-full border border-border bg-surface-sunken px-3 py-1 text-xs text-ink-2">
          <span class="font-mono text-xs text-ink-3">Answered</span>
          <span id="tp-answered" class="font-mono text-xs text-ink">0</span>
        </span>
        <span class="inline-flex items-center gap-2 rounded-full border border-border bg-surface-sunken px-3 py-1 text-xs text-ink-2">
          <span class="font-mono text-xs text-ink-3">Marked</span>
          <span id="tp-marked" class="font-mono text-xs text-ink">0</span>
        </span>
        <span class="inline-flex items-center gap-2 rounded-full border border-border bg-surface-sunken px-3 py-1 text-xs text-ink-2">
          <span class="font-mono text-xs text-ink-3">Total</span>
          <span id="tp-total" class="font-mono text-xs text-ink">—</span>
        </span>

        <button
          id="tp-reset"
          type="button"
          class="ml-auto h-9 px-3 rounded-xl border border-border bg-surface hover:bg-primary-muted hover:text-primary transition-colors text-sm"
        >
          Reset
        </button>
      </div>
    </header>

    <div class="flex-1 min-h-0 flex overflow-hidden">
      <aside class="w-80 border-r border-border bg-surface px-5 py-6 overflow-auto">
        <p class="font-mono text-xs uppercase track-md text-ink-3">Palette</p>
        <p class="mt-2 text-xs text-ink-3">Click a number to jump.</p>
        <div id="tp-pal" class="mt-4 grid grid-cols-5 gap-2" aria-label="Question palette"></div>
      </aside>

      <main class="flex-1 min-h-0 overflow-auto px-8 py-8">
        <div id="tp-q" class="rounded-2xl border border-border bg-surface px-6 py-6"></div>
      </main>
    </div>

    <div
      id="tp-overlay"
      class="fixed inset-0 z-50 bg-ink/50 opacity-0 pointer-events-none transition-opacity"
      aria-hidden="true"
    ></div>

    <div id="tp-modal" class="fixed inset-0 z-50 flex items-center justify-center p-6 pointer-events-none" aria-hidden="true">
      <div
        id="tp-modal-card"
        class="w-full max-w-lg rounded-2xl border border-border bg-surface shadow-sm px-6 py-6 opacity-0 translate-y-4 transition-all duration-200"
      >
        <div class="flex items-start justify-between gap-4">
          <div>
            <p class="font-mono text-xs uppercase track-xl text-ink-3">Submit</p>
            <h2 class="mt-2 font-display text-3xl text-primary">Review summary</h2>
          </div>
          <button
            id="tp-modal-close"
            type="button"
            class="h-10 w-10 rounded-xl border border-border bg-surface hover:bg-primary-muted hover:text-primary transition-colors"
            aria-label="Close"
          >
            ×
          </button>
        </div>

        <div class="mt-6 grid gap-3">
          <div class="rounded-2xl border border-border bg-surface-sunken px-5 py-4">
            <p class="font-mono text-xs uppercase track-md text-ink-3">Answered</p>
            <p id="tp-ma" class="mt-2 font-mono text-sm text-ink-2">—</p>
          </div>
          <div class="rounded-2xl border border-border bg-surface-sunken px-5 py-4">
            <p class="font-mono text-xs uppercase track-md text-ink-3">Unanswered</p>
            <p id="tp-mu" class="mt-2 font-mono text-sm text-ink-2">—</p>
          </div>
          <div class="rounded-2xl border border-border bg-surface-sunken px-5 py-4">
            <p class="font-mono text-xs uppercase track-md text-ink-3">Marked</p>
            <p id="tp-mm" class="mt-2 font-mono text-sm text-ink-2">—</p>
          </div>
        </div>

        <p id="tp-mnote" class="mt-5 text-sm text-ink-2">Confirm submission to end the attempt.</p>

        <div class="mt-6 flex items-center justify-end gap-3">
          <button
            id="tp-modal-cancel"
            type="button"
            class="h-10 px-4 rounded-xl border border-border bg-surface hover:bg-primary-muted hover:text-primary transition-colors"
          >
            Cancel
          </button>
          <button
            id="tp-modal-confirm"
            type="button"
            class="h-10 px-4 rounded-xl border border-border bg-primary hover:bg-primary-light transition-colors"
            style="color: var(--color-text-inverse);"
          >
            Submit attempt
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script data-page-init type="text/javascript">
  (async function () {
    const mod = await import("/js/test-player.js");
    await mod.mountTestPlayer();
  })();
</script>
