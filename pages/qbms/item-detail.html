<div class="p-8 max-w-6xl mx-auto" data-page="item-detail">
  <header class="mb-8">
    <p class="font-mono text-xs uppercase track-xxl text-ink-3">QBMS</p>
    <div class="mt-2 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
      <div>
        <h1 class="font-display text-4xl text-primary">Item Detail</h1>
        <p class="mt-2 text-ink-2">Full question view with metadata, review timeline, and version log (mock).</p>
      </div>
      <a
        href="#/items"
        class="inline-flex items-center gap-2 h-10 px-4 rounded-xl border border-border bg-surface hover:bg-primary-muted hover:text-primary transition-colors"
      >
        <span class="opacity-70">◳</span>
        Back to Kanban
      </a>
    </div>
  </header>

  <section class="grid gap-6 lg:grid-cols-[1fr_22rem]">
    <article class="card" id="item-main"></article>
    <aside class="grid gap-6">
      <div class="card" id="item-meta"></div>
      <div class="card" id="item-timeline"></div>
    </aside>
  </section>

  <section class="mt-6 card" id="item-versions"></section>
</div>

<script data-page-init type="text/javascript">
  (async function () {
    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    const { fetchData, QUESTION_STATUSES, formatDate } = await import("/js/utils.js");
    const { StatusPill } = await import("/components/status-pill.js");

    const root = document.querySelector('[data-page="item-detail"]');
    if (!root) return;

    const els = {
      main: root.querySelector("#item-main"),
      meta: root.querySelector("#item-meta"),
      timeline: root.querySelector("#item-timeline"),
      versions: root.querySelector("#item-versions"),
    };

    const AUTH_KEY = "atp_authored_questions";

    function readJSON(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        const parsed = raw ? JSON.parse(raw) : fallback;
        return parsed ?? fallback;
      } catch {
        return fallback;
      }
    }

    const id = window.__route?.params?.id;
    const baseQuestions = await fetchData("questions");
    const authored = readJSON(AUTH_KEY, []);
    const questions = [...(Array.isArray(authored) ? authored : []), ...(baseQuestions || [])];
    const q = questions.find((x) => x.id === id) || questions[0];
    if (!q) return;

    function optionLine(text, state) {
      const base = "flex items-start gap-3 rounded-2xl border px-4 py-3";
      const cls =
        state === "correct"
          ? `${base} border-border bg-success-muted`
          : `${base} border-border bg-surface hover:bg-primary-muted transition-colors`;

      return `
        <div class="${cls}">
          <span class="mt-1.5 h-2.5 w-2.5 rounded-full ${state === "correct" ? "bg-success" : "bg-border"}"></span>
          <p class="text-sm text-ink-2">${text}</p>
        </div>
      `;
    }

    function renderOptions() {
      const type = String(q.type || "MCQ").toUpperCase();

      if (type === "NUM" || type === "SA") {
        return `
          <div class="mt-5 rounded-2xl border border-border bg-surface-sunken px-5 py-5">
            <p class="font-mono text-xs uppercase track-md text-ink-3">Answer</p>
            <p class="mt-3 font-mono text-sm text-ink-2">${q.answer ?? "—"}</p>
          </div>
        `;
      }

      const optsRaw = Array.isArray(q.options) ? q.options : [];
      const opts = type === "TF" && !optsRaw.length ? ["True", "False"] : optsRaw;

      const correct = Array.isArray(q.answer) ? new Set(q.answer) : new Set([Number(q.answer)]);
      const lines = (opts || []).map((o, idx) => {
        const prefix = String.fromCharCode(65 + idx);
        const state = correct.has(idx) ? "correct" : "neutral";
        return optionLine(`<span class="font-mono text-xs text-ink-3">${prefix}.</span> ${o}`, state);
      });

      return `
        <div class="mt-5">
          <p class="font-mono text-xs uppercase track-md text-ink-3">Options</p>
          <div class="mt-3 grid gap-3">${lines.join("")}</div>
        </div>
      `;
    }

    els.main.innerHTML = `
      <div class="flex items-start justify-between gap-4">
        <div>
          <p class="font-mono text-xs text-ink-3">${q.id}</p>
          <h2 class="mt-2 font-display text-3xl text-primary">${q.domain}</h2>
          <p class="mt-2 text-ink-2">${q.subdomain}</p>
        </div>
        <div class="text-right">
          ${StatusPill(q.status)}
          <p class="mt-2 font-mono text-xs text-ink-3">Exposure ${q.exposureCount}</p>
        </div>
      </div>

      <div class="mt-6 rounded-2xl border border-border bg-surface px-5 py-5">
        <p class="font-mono text-xs uppercase track-md text-ink-3">Prompt</p>
        <p class="mt-3 text-ink-2 leading-relaxed">${q.body}</p>
      </div>

      ${renderOptions()}
    `;

    const metaRows = [
      ["Type", q.type],
      ["Difficulty", q.difficulty],
      ["Bloom", q.bloomLevel],
      ["Language", q.language],
      ["Year", q.year],
      ["Author", q.authorId],
    ];

    els.meta.innerHTML = `
      <p class="font-mono text-xs uppercase track-xl text-ink-3">Metadata</p>
      <div class="mt-4 grid gap-3">
        ${metaRows
          .map(
            ([k, v]) => `
              <div class="rounded-2xl border border-border bg-surface px-4 py-4">
                <p class="font-mono text-xs uppercase track-md text-ink-3">${k}</p>
                <p class="mt-2 text-sm text-ink-2">${v ?? "—"}</p>
              </div>
            `,
          )
          .join("")}
      </div>
    `;

    const order = QUESTION_STATUSES.slice();
    if (!order.includes("retired")) order.push("retired");

    const currentIdx = Math.max(0, order.indexOf(q.status));

    els.timeline.innerHTML = `
      <p class="font-mono text-xs uppercase track-xl text-ink-3">Review timeline</p>
      <p class="mt-2 text-sm text-ink-2">A simplified lifecycle view for this demo.</p>

      <div class="mt-5 space-y-3">
        ${order
          .map((s, idx) => {
            const done = idx < currentIdx;
            const active = idx === currentIdx;
            const dot = done ? "bg-primary" : active ? "bg-accent" : "bg-border";
            const label = done ? "text-ink" : active ? "text-primary" : "text-ink-3";
            return `
              <div class="flex items-start gap-3">
                <span class="mt-1.5 h-2.5 w-2.5 rounded-full ${dot}"></span>
                <div>
                  <p class="text-sm font-medium ${label}">${s.replace(/-/g, " ")}</p>
                  <p class="text-xs text-ink-3 font-mono">${active ? "current" : done ? "complete" : "pending"}</p>
                </div>
              </div>
            `;
          })
          .join("")}
      </div>
    `;

    const seed = Number(String(q.id).replace(/\D/g, "").slice(-4)) || 0;
    const now = Date.now();

    const versions = [
      { v: "v1", label: "Initial draft", t: now - (seed + 7) * 86400000 },
      { v: "v2", label: "Peer edits", t: now - (seed + 4) * 86400000 },
      { v: "v3", label: "SME pass", t: now - (seed + 2) * 86400000 },
    ];

    els.versions.innerHTML = `
      <div class="flex items-start justify-between gap-4">
        <div>
          <p class="font-mono text-xs uppercase track-xl text-ink-3">Version log</p>
          <h2 class="mt-2 font-display text-3xl text-primary">Changes</h2>
        </div>
        <p class="text-sm text-ink-3">Mock history</p>
      </div>

      <div class="mt-6 grid gap-3">
        ${versions
          .map(
            (x) => `
              <div class="rounded-2xl border border-border bg-surface px-5 py-4">
                <div class="flex items-start justify-between gap-4">
                  <div>
                    <p class="font-mono text-xs text-ink-3">${x.v}</p>
                    <p class="mt-1 font-medium text-ink">${x.label}</p>
                  </div>
                  <p class="font-mono text-xs text-ink-3">${formatDate(new Date(x.t))}</p>
                </div>
              </div>
            `,
          )
          .join("")}
      </div>
    `;

    if (!prefersReducedMotion && window.gsap) {
      window.gsap.fromTo(
        root.querySelectorAll(".card"),
        { opacity: 0, y: 18 },
        { opacity: 1, y: 0, duration: 0.6, ease: "power2.out", stagger: 0.06 },
      );
    }
  })();
</script>
