<div class="p-8 max-w-screen-2xl mx-auto" data-page="test-packs">
  <header class="mb-8">
    <p class="font-mono text-xs uppercase track-xxl text-ink-3">EXAM OPS</p>
    <div class="mt-2 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
      <div>
        <h1 class="font-display text-4xl text-primary">Test Packs</h1>
        <p class="mt-2 max-w-2xl text-ink-2">
          Pack list with hash copy, open-window countdown, and status indicators.
        </p>
      </div>

      <a
        href="#/assembly"
        class="inline-flex items-center gap-2 h-10 px-4 rounded-xl border border-border bg-primary hover:bg-primary-light transition-colors"
        style="color: var(--color-text-inverse);"
      >
        <span class="opacity-80">◧</span>
        Assemble new pack
      </a>
    </div>
  </header>

  <section id="packs-grid" class="grid gap-4 md:grid-cols-2 xl:grid-cols-3" aria-label="Pack list"></section>
</div>

<script data-page-init type="text/javascript">
  (async function () {
    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    const { fetchData, formatDate } = await import("/js/utils.js");
    const { StatusPill } = await import("/components/status-pill.js");
    const { HashDisplay, mountHashCopy } = await import("/components/hash-display.js");

    const root = document.querySelector('[data-page="test-packs"]');
    if (!root) return;

    const grid = root.querySelector("#packs-grid");

    const [packs, sessions, centers, blueprints] = await Promise.all([
      fetchData("test-packs"),
      fetchData("sessions"),
      fetchData("centers"),
      fetchData("blueprints"),
    ]);

    let extraPacks = [];
    try {
      extraPacks = JSON.parse(localStorage.getItem("atp_extra_packs") || "[]");
      if (!Array.isArray(extraPacks)) extraPacks = [];
    } catch {
      extraPacks = [];
    }

    const seen = new Set();
    const allPacks = [...extraPacks, ...packs].filter((p) => {
      const id = p?.packId;
      if (!id || seen.has(id)) return false;
      seen.add(id);
      return true;
    });

    const sessionById = new Map(sessions.map((s) => [s.sessionId, s]));
    const centerById = new Map(centers.map((c) => [c.centerId, c]));
    const bpById = new Map(blueprints.map((b) => [b.id, b]));

    const timers = new Set();

    window.addEventListener(
      "hashchange",
      () => {
        timers.forEach((id) => clearInterval(id));
        timers.clear();
      },
      { once: true },
    );


    function parseTs(ts) {
      const d = new Date(ts);
      return Number.isNaN(d.getTime()) ? null : d;
    }

    function fmtCountdown(ms) {
      const clamped = Math.max(0, ms);
      const m = Math.floor(clamped / 60000);
      const s = Math.floor((clamped % 60000) / 1000);
      return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    }

    function packCard(p) {
      const session = sessionById.get(p.sessionId);
      const center = session ? centerById.get(session.centerId) : null;
      const bp = bpById.get(p.blueprintId);

      const openStart = parseTs(p.openWindowStart);
      const openEnd = parseTs(p.openWindowEnd);
      const now = new Date();

      let windowLabel = "—";
      let countdownTarget = null;
      if (openStart && now < openStart) {
        windowLabel = "Opens in";
        countdownTarget = openStart;
      } else if (openStart && openEnd && now >= openStart && now <= openEnd) {
        windowLabel = "Open window";
      } else if (openEnd && now > openEnd) {
        windowLabel = "Window closed";
      }

      const dot =
        p.status === "open"
          ? `<span class="h-2.5 w-2.5 rounded-full bg-success text-success pulse-dot"></span>`
          : p.status === "expired"
            ? `<span class="h-2.5 w-2.5 rounded-full bg-danger"></span>`
            : `<span class="h-2.5 w-2.5 rounded-full bg-border"></span>`;

      const countdownEl = countdownTarget
        ? `<span class="font-mono text-xs" data-countdown="${countdownTarget.toISOString()}">--:--</span>`
        : `<span class="font-mono text-xs text-ink-3">${openStart ? `${openStart.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}–${openEnd ? openEnd.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) : ""}` : "—"}</span>`;

      return `
        <article class="pack-card rounded-2xl border border-border bg-surface px-5 py-5 hover:bg-primary-muted hover:text-primary transition-colors">
          <div class="flex items-start justify-between gap-4">
            <div>
              <p class="font-mono text-xs text-ink-3">${p.packId}</p>
              <h2 class="mt-2 font-display text-2xl text-primary">${bp?.name || p.blueprintId}</h2>
              <p class="mt-2 text-sm text-ink-2">${session ? `${formatDate(session.date)} · ${session.startTime}–${session.endTime}` : "—"}</p>
              <p class="mt-1 text-sm text-ink-2">${center ? `${center.name} · ${center.city}` : "—"}</p>
            </div>
            <div class="text-right">
              ${StatusPill(p.status, "sm")}
              <p class="mt-3 text-xs text-ink-3 font-mono">${p.questionIds?.length || 0} items</p>
            </div>
          </div>

          <div class="mt-5">${HashDisplay(p.hash, { label: "hash" })}</div>

          <div class="mt-5 flex items-center justify-between gap-3">
            <div class="flex items-center gap-2">
              ${dot}
              <p class="text-xs text-ink-3 font-mono uppercase track-md">${windowLabel}</p>
            </div>
            ${countdownEl}
          </div>

          <div class="mt-4 flex items-center justify-between gap-4">
            <p class="text-xs text-ink-3 font-mono">Session: ${p.sessionId}</p>
            <p class="text-xs text-ink-3 font-mono">Generated: ${p.generatedAt ? new Date(p.generatedAt).toLocaleString() : "—"}</p>
          </div>
        </article>
      `;
    }

    function startCountdowns() {
      timers.forEach((id) => clearInterval(id));
      timers.clear();

      const interval = setInterval(() => {
        root.querySelectorAll("[data-countdown]").forEach((el) => {
          const t = parseTs(el.getAttribute("data-countdown"));
          if (!t) return;
          const ms = t.getTime() - Date.now();
          el.textContent = fmtCountdown(ms);
        });
      }, 400);

      timers.add(interval);
    }

    function render() {
      grid.innerHTML = allPacks
        .slice()
        .sort((a, b) => (a.generatedAt || "").localeCompare(b.generatedAt || ""))
        .reverse()
        .map(packCard)
        .join("");

      mountHashCopy(document);
      startCountdowns();

      if (!prefersReducedMotion && window.gsap && window.ScrollTrigger) {
        window.gsap.fromTo(
          grid.querySelectorAll(".pack-card"),
          { opacity: 0, y: 24 },
          {
            opacity: 1,
            y: 0,
            duration: 0.7,
            ease: "power2.out",
            stagger: 0.07,
            scrollTrigger: { trigger: grid, start: "top 85%" },
          },
        );
      }
    }

    render();
  })();
</script>
