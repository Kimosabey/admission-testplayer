<div class="p-8 max-w-6xl mx-auto" data-page="dashboard">
  <header class="mb-10">
    <p class="font-mono text-xs uppercase track-xxl text-ink-3">CANDIDATE</p>
    <h1 class="mt-2 font-display text-5xl text-primary">My Dashboard</h1>
    <p class="mt-4 max-w-2xl text-ink-2">
      Upcoming session, attempt history, and status timeline. Use the Booking flow to change the active session.
    </p>
  </header>

  <section class="grid gap-6 lg:grid-cols-3">
    <article class="card lg:col-span-2 dash-card" id="upcoming-card"></article>
    <article class="card dash-card" id="timeline-card"></article>
  </section>

  <section class="mt-6 card dash-card" id="attempts-card"></section>
</div>

<script data-page-init type="text/javascript">
  (async function () {
    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    const { fetchData, formatDate } = await import("/js/utils.js");
    const { store } = await import("/js/store.js");
    const { StatusPill } = await import("/components/status-pill.js");

    const root = document.querySelector('[data-page="dashboard"]');
    if (!root) return;

    const upcomingEl = root.querySelector("#upcoming-card");
    const timelineEl = root.querySelector("#timeline-card");
    const attemptsEl = root.querySelector("#attempts-card");

    const [candidates, sessions, centers, scores, alerts] = await Promise.all([
      fetchData("candidates"),
      fetchData("sessions"),
      fetchData("centers"),
      fetchData("scores"),
      fetchData("alerts").catch(() => []),
    ]);

    if (alerts?.length) {
      const unresolved = alerts.filter((a) => !a.resolved).length;
      store.setState({ alertCount: unresolved });
    }

    const state = store.getState();
    let candidate = candidates.find((c) => c.applicationId === state.candidateId) || candidates[0];
    if (!candidate) return;

    if (candidate.applicationId !== state.candidateId) {
      store.setState({ candidateId: candidate.applicationId });
    }

    const sessionId = state.activeSessionId || candidate.sessionId;
    const session =
      sessions.find((s) => s.sessionId === sessionId) ||
      sessions.find((s) => s.sessionId === candidate.sessionId);
    const center = session ? centers.find((c) => c.centerId === session.centerId) : null;

    upcomingEl.innerHTML = `
      <div class="flex items-start justify-between gap-4">
        <div>
          <p class="font-mono text-xs uppercase track-md text-ink-3">Upcoming session</p>
          <h2 class="mt-2 font-display text-3xl text-primary">${session ? formatDate(session.date) : "—"}</h2>
          <p class="mt-2 text-ink-2">${session ? `${session.startTime}–${session.endTime}` : ""}</p>
          <p class="mt-1 text-ink-2">${center ? `${center.name} · ${center.city}` : ""}</p>
        </div>

        <div class="flex flex-col items-end gap-2">
          ${StatusPill(candidate.status)}
          <p class="font-mono text-xs text-ink-3">${candidate.applicationId}</p>
        </div>
      </div>

      <div class="mt-6 grid gap-3 sm:grid-cols-3">
        <div class="rounded-2xl border border-border bg-surface px-4 py-4">
          <p class="font-mono text-xs uppercase track-md text-ink-3">Programs</p>
          <p class="mt-2 text-ink-2">${(candidate.programs || []).join(", ")}</p>
        </div>
        <div class="rounded-2xl border border-border bg-surface px-4 py-4">
          <p class="font-mono text-xs uppercase track-md text-ink-3">Cycle</p>
          <p class="mt-2 text-ink-2">${candidate.cycle}</p>
        </div>
        <div class="rounded-2xl border border-border bg-surface px-4 py-4">
          <p class="font-mono text-xs uppercase track-md text-ink-3">Attempt</p>
          <p class="mt-2 text-ink-2">${candidate.attemptCount}</p>
        </div>
      </div>

      <div class="mt-6 flex flex-wrap items-center gap-3">
        <a
          href="#/booking"
          class="inline-flex items-center gap-2 h-10 px-4 rounded-xl border border-border bg-surface
                 hover:bg-primary-muted hover:text-primary transition-colors"
        >
          <span class="opacity-70">◉</span>
          Book / Change session
        </a>

        <a
          href="#/hall-ticket/${candidate.applicationId}"
          class="inline-flex items-center gap-2 h-10 px-4 rounded-xl border border-border bg-primary hover:bg-primary-light transition-colors"
          style="color: var(--color-text-inverse);"
        >
          <span class="opacity-80">◧</span>
          View hall ticket
        </a>

        <a
          href="#/session/${session?.sessionId || sessionId}"
          class="inline-flex items-center gap-2 h-10 px-4 rounded-xl border border-border bg-warning-muted hover:bg-accent-muted hover:text-warning transition-colors"
          aria-label="Enter secure test player"
        >
          <span class="opacity-70">◲</span>
          Enter Secure Test
        </a>
      </div>
    `;

    const ordered = ["booked", "checked-in", "in-progress", "completed", "no-show"];
    const currentIdx = Math.max(0, ordered.indexOf(candidate.status));

    timelineEl.innerHTML = `
      <p class="font-mono text-xs uppercase track-md text-ink-3">Status timeline</p>
      <h2 class="mt-2 font-display text-2xl text-primary">${candidate.status.replace(/-/g, " ")}</h2>

      <div class="mt-6 space-y-3">
        ${ordered
          .map((s, idx) => {
            const done = idx < currentIdx && candidate.status !== "no-show";
            const active = idx === currentIdx;
            const dot = done ? "bg-primary" : active ? "bg-accent" : "bg-border";
            const label = done ? "text-ink" : active ? "text-primary" : "text-ink-3";
            return `
              <div class="flex items-start gap-3">
                <span class="mt-1.5 h-2.5 w-2.5 rounded-full ${dot}"></span>
                <div>
                  <p class="text-sm font-medium ${label}">${s.replace(/-/g, " ")}</p>
                  <p class="text-xs text-ink-3 font-mono">${idx === currentIdx ? "current" : done ? "complete" : "pending"}</p>
                </div>
              </div>
            `;
          })
          .join("")}
      </div>
    `;

    const rows = scores
      .filter((s) => s.applicationId === candidate.applicationId)
      .slice()
      .sort((a, b) => (a.attempt || 0) - (b.attempt || 0));

    attemptsEl.innerHTML = `
      <div class="flex items-start justify-between gap-4">
        <div>
          <p class="font-mono text-xs uppercase track-md text-ink-3">Attempt history</p>
          <h2 class="mt-2 font-display text-3xl text-primary">Scores</h2>
        </div>
        <p class="text-sm text-ink-3">${rows.length} record(s)</p>
      </div>

      <div class="mt-6 grid gap-3">
        ${
          rows.length
            ? rows
                .map((r) => {
                  const sections = (r.sectionScores || [])
                    .map((x) => `${x.section}: ${x.score}/${x.max}`)
                    .join(" · ");

                  return `
                    <div class="rounded-2xl border border-border bg-surface px-5 py-4">
                      <div class="flex items-start justify-between gap-4">
                        <div>
                          <p class="font-medium text-ink">${r.program} · Attempt ${r.attempt}</p>
                          <p class="mt-1 text-sm text-ink-2">${sections || "—"}</p>
                        </div>
                        <div class="text-right">
                          <p class="font-mono text-lg text-ink">${r.totalScore}</p>
                          <p class="mt-1 text-xs text-ink-3 font-mono">CRM: ${r.exportedToCRM ? "exported" : "pending"}</p>
                        </div>
                      </div>
                    </div>
                  `;
                })
                .join("")
            : `
              <div class="rounded-2xl border border-border bg-surface-sunken px-5 py-5">
                <p class="text-sm text-ink-2">No score records found for this candidate.</p>
              </div>
            `
        }
      </div>
    `;

    if (!prefersReducedMotion && window.gsap) {
      window.gsap.fromTo(
        root.querySelectorAll(".dash-card"),
        { opacity: 0, y: 18 },
        { opacity: 1, y: 0, duration: 0.6, ease: "power2.out", stagger: 0.08 },
      );
    }
  })();
</script>
